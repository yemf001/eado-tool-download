<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EADO App 官方下载站</title>
    <!-- 引入 FontAwesome 图标库 -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      :root {
        --bg-color: #f4f7f6;
        --card-bg: #ffffff;
        --text-main: #2c3e50;
        --text-muted: #7f8c8d;
        --primary: #3498db;
        --primary-hover: #2980b9;
        --android-color: #2ecc71;
        --android-hover: #27ae60;
        --apple-color: #000000;
        --apple-hover: #2c3e50;
        --windows-color: #0078d4;
        --windows-hover: #005a9e;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial,
          sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        line-height: 1.6;
        padding: 40px 20px;
      }

      .container {
        max-width: 850px;
        margin: 0 auto;
      }

      header {
        text-align: center;
        margin-bottom: 40px;
      }

      header h1 {
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 10px;
        color: #1a252f;
      }

      .meta-info {
        font-size: 0.95rem;
        color: var(--text-muted);
      }

      .meta-info span {
        margin: 0 10px;
      }

      .badge {
        background-color: var(--primary);
        color: white;
        padding: 2px 8px;
        border-radius: 12px;
        font-size: 0.85rem;
        font-weight: bold;
      }

      /* 卡片样式 */
      .card {
        background: var(--card-bg);
        border-radius: 16px;
        padding: 30px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        margin-bottom: 25px;
      }

      .card-title {
        font-size: 1.3rem;
        font-weight: 600;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
        border-bottom: 2px solid #f0f3f5;
        padding-bottom: 10px;
      }

      /* 更新日志 */
      .changelog-list {
        list-style: none;
        padding-left: 5px;
      }

      .changelog-list li {
        margin-bottom: 8px;
        position: relative;
        padding-left: 20px;
        color: #34495e;
        white-space: pre-wrap;
      }

      .changelog-list li::before {
        content: "•";
        color: var(--primary);
        font-weight: bold;
        font-size: 1.2rem;
        position: absolute;
        left: 0;
        top: -2px;
      }

      /* 下载网格 */
      .download-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 20px;
      }

      .platform-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 25px 20px;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }

      .platform-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.05);
      }

      .platform-icon {
        font-size: 3rem;
        margin-bottom: 10px;
      }

      .android .platform-icon {
        color: var(--android-color);
      }
      .apple .platform-icon {
        color: var(--apple-color);
      }
      .windows .platform-icon {
        color: var(--windows-color);
      }

      .platform-name {
        font-size: 1.2rem;
        font-weight: 600;
        margin-bottom: 20px;
      }

      /* 按钮通用样式 */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        padding: 12px 20px;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 0.95rem;
        font-weight: 500;
        text-decoration: none;
        cursor: pointer;
        transition: background 0.2s;
        margin-top: auto;
      }

      /* 独立平台的按钮颜色 */
      .btn-android {
        background-color: var(--android-color);
      }
      .btn-android:hover {
        background-color: var(--android-hover);
      }

      .btn-ios {
        background-color: var(--apple-color);
      }
      .btn-ios:hover {
        background-color: var(--apple-hover);
      }

      .btn-windows {
        background-color: var(--windows-color);
      }
      .btn-windows:hover {
        background-color: var(--windows-hover);
      }

      /* 安卓独立按钮列表容器 */
      .android-btn-group {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      /* 骨架屏加载 */
      .loading {
        text-align: center;
        padding: 50px;
        font-size: 1.2rem;
        color: var(--text-muted);
      }

      .loading i {
        margin-bottom: 10px;
        font-size: 2rem;
        animation: spin 1s infinite linear;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- 加载状态提示 -->
      <div id="loading-view" class="loading">
        <i class="fa-solid fa-circle-notch"></i>
        <div>正在获取最新版本信息...</div>
      </div>

      <!-- 主体内容 -->
      <div id="main-view" class="hidden">
        <header>
          <h1 id="app-title">EADO App</h1>
          <div class="meta-info">
            <span
              >当前版本: <mark id="version-tag" class="badge">---</mark></span
            >
            <span>更新时间: <span id="release-date">---</span></span>
          </div>
        </header>

        <!-- 卡片 1: 更新日志 -->
        <div class="card">
          <div class="card-title">
            <i
              class="fa-solid fa-clock-rotate-left"
              style="color: var(--primary)"
            ></i>
            更新日志
          </div>
          <ul id="changelog-content" class="changelog-list"></ul>
        </div>

        <!-- 卡片 2: 软件下载 -->
        <div class="card">
          <div class="card-title">
            <i class="fa-solid fa-download" style="color: var(--primary)"></i>
            软件下载
          </div>

          <div class="download-grid">
            <!-- Android 平台卡片 -->
            <div class="platform-card android">
              <div class="platform-icon">
                <i class="fa-brands fa-android"></i>
              </div>
              <div class="platform-name">Android 端</div>
              <!-- 👈 这里改成了按钮容器，用来直接铺开所有架构包 -->
              <div id="android-buttons" class="android-btn-group"></div>
            </div>

            <!-- iOS 平台卡片 -->
            <div class="platform-card apple">
              <div class="platform-icon">
                <i class="fa-brands fa-apple"></i>
              </div>
              <div class="platform-name">iOS 免签版</div>
              <a id="btn-ios" href="#" class="btn btn-ios" target="_blank"
                ><i class="fa-solid fa-down-long"></i> 立即安装</a
              >
            </div>

            <!-- Windows 平台卡片 -->
            <div class="platform-card windows">
              <div class="platform-icon">
                <i class="fa-brands fa-windows"></i>
              </div>
              <div class="platform-name">Windows 桌面端</div>
              <a
                id="btn-windows"
                href="#"
                class="btn btn-windows"
                target="_blank"
                ><i class="fa-solid fa-down-long"></i> 格式下载</a
              >
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        // 从指定的绝对路径拉取最新的配置 JSON
        const JSON_URL =
          "/eado-tool-download/latest.json?t=" + new Date().getTime();

        fetch(JSON_URL)
          .then((response) => {
            if (!response.ok) throw new Error("未找到配置文件");
            return response.json();
          })
          .then((data) => {
            renderPage(data);
          })
          .catch((err) => {
            console.error(err);
            document.getElementById("loading-view").innerHTML = `
                        <i class="fa-solid fa-triangle-exclamation" style="color: #e74c3c; animation:none;"></i>
                        <div style="margin-top:10px; color:#e74c3c;">加载失败，请检查远程配置源是否正常</div>
                    `;
          });
      });

      function renderPage(data) {
        // 1. 填入基础版本和日期元数据
        document.getElementById("version-tag").innerText = data.version;
        document.getElementById("release-date").innerText = data.releaseDate;

        // 2. 动态渲染更新日志列表
        const changelogContainer = document.getElementById("changelog-content");
        changelogContainer.innerHTML = "";

        const notesArray = data.releaseNotes.split(/\n/);
        notesArray.forEach((note) => {
          const cleanNote = note.trim();
          if (cleanNote) {
            const text = cleanNote.startsWith("-")
              ? cleanNote.substring(1).trim()
              : cleanNote;
            const li = document.createElement("li");
            li.innerText = text;
            changelogContainer.appendChild(li);
          }
        });

        // 3. 渲染静态单直链平台 (iOS 和 Windows)
        if (data.platforms.ios) {
          document.getElementById("btn-ios").href = data.platforms.ios.url;
        }
        if (data.platforms.windows) {
          document.getElementById("btn-windows").href =
            data.platforms.windows.url;
        }

        // 4. 👈 动态渲染 Android 所有子按钮，直接平铺展示
        if (data.platforms.android && data.platforms.android.subLinks) {
          const btnContainer = document.getElementById("android-buttons");
          btnContainer.innerHTML = "";

          data.platforms.android.subLinks.forEach((item) => {
            const btn = document.createElement("a");
            btn.href = item.url;
            btn.className = "btn btn-android";
            btn.target = "_blank";
            // 按钮文字根据架构动态调整，如果是 Universal 就突出显示，其他显示架构名
            btn.innerHTML = `<i class="fa-solid fa-down-long"></i> 下载 ${item.arch} 包`;

            // 如果是通用包（Universal），可以在视觉上做一个稍微显眼的样式（可选）
            if (item.arch.toLowerCase() === "universal") {
              btn.style.fontWeight = "bold";
            }

            btnContainer.appendChild(btn);
          });
        }

        // 5. 切换视图展现
        document.getElementById("loading-view").classList.add("hidden");
        document.getElementById("main-view").classList.remove("hidden");
      }
    </script>
  </body>
</html>
