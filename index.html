<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的第一个 GitHub Pages 网站</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        h1 {
            color: #4a5568;
            margin-bottom: 1rem;
            font-size: 1.8rem;
        }
        p {
            color: #718096;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.2s ease;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn:hover {
            background: #5a67d8;
        }
        .footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #a0aec0;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>🎉 成功了！</h1>
        <p>这是我的第一个 GitHub Pages 静态网页。它已经成功部署并向全世界公开访问了！</p>
        <button class="btn" onclick="celebrate()">点我庆祝一下</button>
        <div class="footer">Powered by GitHub Pages</div>
    </div>

    <script>
        function celebrate() {
            alert('🚀 祝贺你迈出了网页部署的第一步！继续加油！');
        }
    </script>
</body>
</html>
