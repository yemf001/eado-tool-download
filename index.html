<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>应用下载中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      @keyframes pulse-subtle {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.02);
        }
      }
      .recommend-btn {
        animation: pulse-subtle 3s infinite ease-in-out;
      }
    </style>
  </head>
  <body
    class="bg-gray-50 text-gray-800 antialiased min-h-screen flex flex-col justify-between"
  >
    <main class="container mx-auto px-4 py-8 max-w-4xl">
      <header class="text-center mb-10">
        <h1 class="text-3xl md:text-4xl font-bold text-gray-900 mb-2">
          应用下载中心
        </h1>
        <div
          id="version-badge"
          class="inline-block bg-blue-100 text-blue-800 text-sm font-semibold px-3 py-1 rounded-full mb-4"
        >
          加载中...
        </div>

        <div
          class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 max-w-xl mx-auto text-left"
        >
          <h3
            class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-2"
          >
            更新日志
          </h3>
          <pre
            id="release-notes"
            class="text-gray-600 text-sm font-sans whitespace-pre-wrap break-all leading-relaxed"
          >
正在获取更新日志...</pre
          >
        </div>
      </header>

      <section
        id="download-grid"
        class="grid grid-cols-1 md:grid-cols-3 gap-6 items-start"
      >
        <div class="text-center col-span-full py-12 text-gray-400">
          <i class="fas fa-spinner fa-spin text-3xl mb-2"></i>
          <p>正在加载下载列表...</p>
        </div>
      </section>
    </main>

    <footer
      class="text-center py-6 text-sm text-gray-400 border-t border-gray-100 bg-white"
    >
      &copy; 2026 Eado Tool. All rights reserved.
    </footer>

    <script>
      // 模拟通过 fetch 拿到的本地/网络 JSON
      // const JSON_URL =
      //   "/eado-tool-download/latest.json?t=" + new Date().getTime();
      const JSON_URL = "/latest.json?t=" + new Date().getTime();

      const iconMap = {
        android: "fa-brands fa-android text-green-500",
        apple: "fa-brands fa-apple text-gray-800",
        windows: "fa-brands fa-windows text-blue-500",
      };

      async function initDownloadPage() {
        try {
          // 这里为了演示演示，假设 fetch 已经成功拿到你提供的 JSON
          const response = await fetch(JSON_URL);
          if (!response.ok) throw new Error("网络请求失败");
          const data = await response.json();

          document.getElementById("version-badge").innerHTML = `
                    <i class="fas fa-code-branch mr-1"></i> ${data.version} (${data.releaseDate})
                `;
          document.getElementById("release-notes").textContent =
            data.releaseNotes;

          const gridContainer = document.getElementById("download-grid");
          gridContainer.innerHTML = "";

          Object.keys(data.platforms).forEach((key) => {
            const platform = data.platforms[key];
            const iconClass = iconMap[platform.icon] || "fa-solid fa-download";

            const card = document.createElement("div");
            card.className =
              "bg-white rounded-2xl shadow-sm border border-gray-100 p-6 flex flex-col justify-between transition-all duration-200 hover:shadow-md";

            // 动态获取当前平台的文件名（修复 Windows 不显示文件名的问题）
            let displayFilename = "点击上方选择版本";
            if (platform.filename) {
              displayFilename = platform.filename; // 直连平台（Windows）
            } else if (platform.subLinks && platform.subLinks.length === 1) {
              displayFilename = platform.subLinks[0].filename;
            }

            let cardHtml = `
                        <div>
                            <div class="flex items-center space-x-3 mb-6">
                                <div class="w-12 h-12 rounded-xl bg-gray-50 flex items-center justify-center text-2xl">
                                    <i class="${iconClass}"></i>
                                </div>
                                <h2 class="text-xl font-bold text-gray-800">${platform.name}</h2>
                            </div>
                            <div class="space-y-3">
                    `;

            // 渲染子按钮
            if (platform.subLinks && platform.subLinks.length > 0) {
              platform.subLinks.forEach((link) => {
                if (link.arch === "arm64-v8a") {
                  cardHtml += `
                                    <a href="${link.url}" class="recommend-btn block text-center w-full bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white font-bold py-3 px-4 rounded-xl shadow-md shadow-green-100 transition-all text-sm break-all relative overflow-hidden">
                                        <span class="absolute top-0 right-0 bg-yellow-400 text-emerald-900 text-[10px] font-extrabold px-2 py-0.5 rounded-bl-lg uppercase tracking-wider shadow-sm">RECOMMEND</span>
                                        <i class="fas fa-star text-yellow-300 mr-1 animate-pulse"></i> 下载 (arm64 推荐)
                                    </a>
                                `;
                } else if (key === "ios") {
                  cardHtml += `
                                    <a href="${link.url}" class="block text-center w-full bg-gray-50 hover:bg-gray-100 text-gray-700 font-medium py-2.5 px-4 rounded-xl border border-gray-200/60 transition-colors text-sm break-all">
                                        下载 ${link.name} <span class="text-xs text-red-500 font-normal block md:inline md:ml-1">(需自签)</span>
                                    </a>
                                `;
                } else {
                  cardHtml += `
                                    <a href="${link.url}" class="block text-center w-full bg-gray-50 hover:bg-gray-100 text-gray-700 font-medium py-2.5 px-4 rounded-xl border border-gray-200/60 transition-colors text-sm break-all">
                                        下载 (${link.arch || link.name})
                                    </a>
                                `;
                }
              });

              // --- 新增：如果是 iOS 平台，在按钮下方插入保姆级自签提示框 ---
              if (key === "ios") {
                cardHtml += `
                                <div class="mt-4 bg-amber-50/70 border border-amber-200/60 rounded-xl p-3 text-xs text-amber-800 leading-relaxed">
                                    <p class="font-bold mb-1"><i class="fas fa-circle-info text-amber-600 mr-1"></i> 苹果手机用户安装提示：</p>
                                    <p>由于本App是<span class="font-bold text-red-600">未签名版(IPA)</span>，无法直接在手机上点击安装。你需要将文件下载后，使用签名工具进行签名投递。</p>
                                    <p class="mt-1.5 font-semibold text-gray-700">🛠️ 推荐使用以下工具安装：</p>
                                    <ul class="list-disc pl-4 mt-0.5 space-y-0.5 text-gray-600">
                                        <li><strong class="text-gray-800">电脑端：</strong>爱思助手（全自动签名安装）/ Sideloadly</li>
                                        <li><strong class="text-gray-800">手机端：</strong>轻松签 / 巨魔商店 (TrollStore) / AltStore</li>
                                    </ul>
                                </div>
                            `;
              }
            } else if (platform.url) {
              // Windows 直连
              cardHtml += `
                            <a href="${platform.url}" class="block text-center w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-xl shadow-sm shadow-blue-200 transition-colors text-sm break-all">
                                <i class="fas fa-arrow-down mr-1"></i> 立即下载
                            </a>
                        `;
            }

            cardHtml += `
                            </div>
                        </div>
                        <div class="mt-4 pt-3 border-t border-gray-50 text-xs text-gray-400 text-center truncate" title="${displayFilename}">
                            ${displayFilename}
                        </div>
                    `;

            card.innerHTML = cardHtml;
            gridContainer.appendChild(card);
          });
        } catch (error) {
          console.error("加载失败:", error);
          document.getElementById("download-grid").innerHTML = `
                    <div class="text-center col-span-full py-12 text-red-500">
                        <i class="fas fa-exclamation-circle text-3xl mb-2"></i>
                        <p>数据加载失败，请刷新重试</p>
                    </div>
                `;
        }
      }

      document.addEventListener("DOMContentLoaded", initDownloadPage);
    </script>
  </body>
</html>
