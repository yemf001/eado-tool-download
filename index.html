<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>应用下载中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      @keyframes pulse-subtle {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.02);
        }
      }
      .recommend-btn {
        animation: pulse-subtle 3s infinite ease-in-out;
      }
    </style>
  </head>
  <body
    class="bg-gray-50 text-gray-800 antialiased min-h-screen flex flex-col justify-between"
  >
    <main class="container mx-auto px-4 py-8 max-w-7xl">
      <header class="text-center mb-10">
        <h1 class="text-3xl md:text-4xl font-bold text-gray-900 mb-2">
          应用下载中心
        </h1>
        <div
          id="version-badge"
          class="inline-block bg-blue-100 text-blue-800 text-sm font-semibold px-3 py-1 rounded-full mb-4"
        >
          加载中...
        </div>

        <div
          class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 max-w-xl mx-auto text-left"
        >
          <h3
            class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-2"
          >
            更新日志
          </h3>
          <pre
            id="release-notes"
            class="text-gray-600 text-sm font-sans whitespace-pre-wrap break-all leading-relaxed"
          >
正在获取更新日志...</pre
          >
        </div>
      </header>

      <section
        id="download-grid"
        class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-6 items-start"
      >
        <div class="text-center col-span-full py-12 text-gray-400">
          <i class="fas fa-spinner fa-spin text-3xl mb-2"></i>
          <p>正在加载下载列表...</p>
        </div>
      </section>
    </main>

    <footer
      class="text-center py-6 text-sm text-gray-400 border-t border-gray-100 bg-white"
    >
      &copy; 2026 Eado Tool. All rights reserved.
    </footer>

    <script>
      const JSON_URL =
        "/eado-tool-download/latest.json?t=" + new Date().getTime();
      // const JSON_URL = "/latest.json?t=" + new Date().getTime();

      // 内置兜底图标，如果 JSON 里的 icon 没填或写错，可以通过 key 匹配，再不行就用通用图标
      const defaultIcons = {
        android: "fa-brands fa-android text-green-500",
        apple: "fa-brands fa-apple text-gray-800",
        ios: "fa-brands fa-apple text-gray-800",
        mac: "fa-brands fa-apple text-indigo-600",
        macos: "fa-brands fa-apple text-indigo-600",
        windows: "fa-brands fa-windows text-blue-500",
        linux: "fa-brands fa-linux text-orange-500",
      };

      async function initDownloadPage() {
        try {
          const response = await fetch(JSON_URL);
          if (!response.ok) throw new Error("网络请求失败");
          const data = await response.json();

          document.getElementById("version-badge").innerHTML = `
            <i class="fas fa-code-branch mr-1"></i> ${data.version} (${data.releaseDate})
          `;
          document.getElementById("release-notes").textContent =
            data.releaseNotes;

          const gridContainer = document.getElementById("download-grid");
          gridContainer.innerHTML = "";

          Object.keys(data.platforms).forEach((key) => {
            const platform = data.platforms[key];

            // 1. 图标解耦：优先采用 JSON 配置的完整类名，其次用内置映射，最后用默认下载图标
            const iconClass =
              platform.icon && platform.icon.includes(" ")
                ? platform.icon
                : defaultIcons[platform.icon] ||
                  defaultIcons[key] ||
                  "fa-solid fa-download text-blue-500";

            const card = document.createElement("div");
            card.className =
              "bg-white rounded-2xl shadow-sm border border-gray-100 p-6 flex flex-col justify-between h-full transition-all duration-200 hover:shadow-md";

            // 2. 底部文件名解耦：完全根据数据结构推导
            let displayFilename = "包含多个安装包";
            if (platform.filename) {
              displayFilename = platform.filename;
            } else if (platform.subLinks) {
              if (platform.subLinks.length === 1) {
                displayFilename = platform.subLinks[0].filename || "点击下载";
              } else {
                const types = platform.subLinks
                  .map((l) => l.type || l.arch || l.name)
                  .filter(Boolean);
                displayFilename = types.length
                  ? `支持 ${types.slice(0, 3).join(" / ")}`
                  : "包含多个版本";
              }
            }

            let cardHtml = `
              <div>
                <div class="flex items-center space-x-3 mb-6">
                  <div class="w-12 h-12 rounded-xl bg-gray-50 flex items-center justify-center text-2xl">
                    <i class="${iconClass}"></i>
                  </div>
                  <h2 class="text-xl font-bold text-gray-800">${platform.name}</h2>
                </div>
                <div class="space-y-3">
            `;

            // 3. 按钮渲染解耦
            if (platform.subLinks && platform.subLinks.length > 0) {
              platform.subLinks.forEach((link) => {
                // 如果在 JSON 中明确标记了是推荐包（比如 Android 的 arm64）
                if (link.isRecommend || link.arch === "arm64-v8a") {
                  cardHtml += `
                    <a href="${link.url}" class="recommend-btn block text-center w-full bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white font-bold py-3 px-4 rounded-xl shadow-md shadow-green-100 transition-all text-sm break-all relative overflow-hidden">
                      <span class="absolute top-0 right-0 bg-yellow-400 text-emerald-900 text-[10px] font-extrabold px-2 py-0.5 rounded-bl-lg uppercase tracking-wider shadow-sm">RECOMMEND</span>
                      <i class="fas fa-star text-yellow-300 mr-1 animate-pulse"></i> ${link.name || "立即下载 (" + (link.arch || "推荐") + ")"}
                    </a>
                  `;
                } else {
                  // 普通子链接按钮，支持带小尾巴标签（例如：需自签）
                  const tagHtml = link.tag
                    ? `<span class="text-xs text-red-500 font-normal block xl:inline xl:ml-1">(${link.tag})</span>`
                    : "";
                  cardHtml += `
                    <a href="${link.url}" class="block text-center w-full bg-gray-50 hover:bg-gray-100 text-gray-700 font-medium py-2.5 px-4 rounded-xl border border-gray-200/60 transition-colors text-sm break-all">
                      下载 ${link.name || link.arch || ""} ${tagHtml}
                    </a>
                  `;
                }
              });

              // 4. 提示框解耦：只要 JSON 里面配了 notice 节点就渲染，支持不同颜色警告样式
              if (platform.notice) {
                const isAlert = platform.notice.type === "danger";
                const boxClass = isAlert
                  ? "bg-red-50/70 border-red-200/60 text-red-900"
                  : "bg-amber-50/70 border-amber-200/60 text-amber-800";
                const iconColor = isAlert ? "text-red-600" : "text-amber-600";

                cardHtml += `
                  <div class="mt-4 border rounded-xl p-3 text-xs leading-relaxed ${boxClass}">
                    <p class="font-bold mb-1"><i class="fas fa-circle-info ${iconColor} mr-1"></i> ${platform.notice.title}</p>
                    <p>${platform.notice.content}</p>
                  </div>
                `;
              }
            } else if (platform.url) {
              // 单直连文件（例如 Windows 或 Web直连）
              const btnBg =
                platform.theme === "blue" || !platform.theme
                  ? "bg-blue-600 hover:bg-blue-700 shadow-blue-200"
                  : "bg-gray-800 hover:bg-gray-900 shadow-gray-200";
              cardHtml += `
                <a href="${platform.url}" class="block text-center w-full ${btnBg} text-white font-medium py-3 px-4 rounded-xl shadow-sm transition-colors text-sm break-all">
                  <i class="fas fa-arrow-down mr-1"></i> 立即下载
                </a>
              `;
            }

            cardHtml += `
                </div>
              </div>
              <div class="mt-4 pt-3 border-t border-gray-50 text-xs text-gray-400 text-center truncate" title="${displayFilename}">
                ${displayFilename}
              </div>
            `;

            card.innerHTML = cardHtml;
            gridContainer.appendChild(card);
          });
        } catch (error) {
          console.error("加载失败:", error);
          document.getElementById("download-grid").innerHTML = `
            <div class="text-center col-span-full py-12 text-red-500">
              <i class="fas fa-exclamation-circle text-3xl mb-2"></i>
              <p>数据加载失败，请刷新重试</p>
            </div>
          `;
        }
      }

      document.addEventListener("DOMContentLoaded", initDownloadPage);
    </script>
  </body>
</html>
