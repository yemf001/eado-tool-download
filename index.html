<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EADO App 官方下载站</title>
    <!-- 引入 FontAwesome 图标库 -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      :root {
        --bg-color: #f4f7f6;
        --card-bg: #ffffff;
        --text-main: #2c3e50;
        --text-muted: #7f8c8d;
        --primary: #3498db;
        --primary-hover: #2980b9;
        --android-color: #2ecc71;
        --android-hover: #27ae60;
        --apple-color: #000000;
        --apple-hover: #2c3e50;
        --windows-color: #0078d4;
        --windows-hover: #005a9e;
        --warning-bg: #fff9db; /* 👈 新增：提示框背景色 */
        --warning-border: #ffe066; /* 👈 新增：提示框边框色 */
        --warning-text: #856404; /* 👈 新增：提示框文字颜色 */
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial,
          sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        line-height: 1.6;
        padding: 40px 20px;
      }

      .container {
        max-width: 1100px;
        margin: 0 auto;
      }

      header {
        text-align: center;
        margin-bottom: 40px;
      }

      header h1 {
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 10px;
        color: #1a252f;
      }

      .meta-info {
        font-size: 0.95rem;
        color: var(--text-muted);
      }

      .meta-info span {
        margin: 0 10px;
      }

      .badge {
        background-color: var(--primary);
        color: white;
        padding: 2px 8px;
        border-radius: 12px;
        font-size: 0.85rem;
        font-weight: bold;
      }

      .main-layout {
        display: grid;
        grid-template-columns: 1fr;
        gap: 25px;
        align-items: start;
      }

      /* 卡片基础设计 */
      .card {
        background: var(--card-bg);
        border-radius: 16px;
        padding: 30px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      }

      .card-title {
        font-size: 1.2rem;
        font-weight: 600;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
        border-bottom: 2px solid #f0f3f5;
        padding-bottom: 10px;
      }

      /* 更新日志列表 */
      .changelog-list {
        list-style: none;
        padding-left: 5px;
      }

      .changelog-list li {
        margin-bottom: 12px;
        position: relative;
        padding-left: 20px;
        color: #34495e;
        white-space: pre-wrap;
        font-size: 0.95rem;
      }

      .changelog-list li::before {
        content: "•";
        color: var(--primary);
        font-weight: bold;
        font-size: 1.2rem;
        position: absolute;
        left: 0;
        top: -2px;
      }

      /* 下载区域垂直链条 */
      .download-stack {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .platform-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }

      .platform-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.04);
      }

      .platform-header {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .platform-icon {
        font-size: 1.8rem;
      }

      .android .platform-icon {
        color: var(--android-color);
      }
      .apple .platform-icon {
        color: var(--apple-color);
      }
      .windows .platform-icon {
        color: var(--windows-color);
      }

      .platform-name {
        font-size: 1.1rem;
        font-weight: 600;
      }

      /* 按钮通用设计 */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 11px 20px;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 0.9rem;
        font-weight: 500;
        text-decoration: none;
        cursor: pointer;
        transition: background 0.2s;
        max-width: 280px;
        width: 100%;
      }

      .btn-android {
        background-color: var(--android-color);
      }
      .btn-android:hover {
        background-color: var(--android-hover);
      }

      .btn-ios {
        background-color: var(--apple-color);
      }
      .btn-ios:hover {
        background-color: var(--apple-hover);
      }

      .btn-windows {
        background-color: var(--windows-color);
      }
      .btn-windows:hover {
        background-color: var(--windows-hover);
      }

      /* 安卓多子包 */
      .android-btn-group {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 10px;
        width: 100%;
      }

      .android-btn-group .btn {
        max-width: 100%;
      }

      /* 👈 新增：iOS 独占说明提示框样式 */
      .ios-notice {
        background-color: var(--warning-bg);
        border: 1px solid var(--warning-border);
        color: var(--warning-text);
        padding: 10px 15px;
        border-radius: 8px;
        font-size: 0.85rem;
        display: flex;
        align-items: flex-start;
        gap: 8px;
        width: 100%;
      }
      .ios-notice i {
        margin-top: 3px;
        font-size: 1rem;
      }

      /* 骨架屏 */
      .loading {
        text-align: center;
        padding: 50px;
        font-size: 1.2rem;
        color: var(--text-muted);
      }

      .loading i {
        margin-bottom: 10px;
        font-size: 2rem;
        animation: spin 1s infinite linear;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .hidden {
        display: none !important;
      }

      /* 电脑端/大屏设备媒体查询适配 */
      @media (min-width: 768px) {
        .main-layout {
          grid-template-columns: 4fr 5fr;
        }

        .platform-card {
          flex-direction: row;
          align-items: center;
          justify-content: space-between;
          padding: 20px 25px;
        }

        /* 👈 调整电脑端的弹性盒行为，让提示框整体换行靠下显示 */
        .apple {
          flex-wrap: wrap;
        }
        .apple .platform-header {
          min-width: 150px;
        }

        .android {
          flex-direction: column;
          align-items: flex-start;
        }

        .btn {
          max-width: 200px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- 加载状态 -->
      <div id="loading-view" class="loading">
        <i class="fa-solid fa-circle-notch"></i>
        <div>正在获取最新版本信息...</div>
      </div>

      <!-- 主体内容 -->
      <div id="main-view" class="hidden">
        <header>
          <h1 id="app-title">EADO App</h1>
          <div class="meta-info">
            <span
              >当前版本: <mark id="version-tag" class="badge">---</mark></span
            >
            <span>更新时间: <span id="release-date">---</span></span>
          </div>
        </header>

        <!-- 响应式双列包裹层 -->
        <div class="main-layout">
          <!-- 左侧/上侧: 更新日志 -->
          <div class="card" style="height: 100%">
            <div class="card-title">
              <i
                class="fa-solid fa-clock-rotate-left"
                style="color: var(--primary)"
              ></i>
              更新日志
            </div>
            <ul id="changelog-content" class="changelog-list"></ul>
          </div>

          <!-- 右侧/下侧: 软件下载 -->
          <div class="card">
            <div class="card-title">
              <i class="fa-solid fa-download" style="color: var(--primary)"></i>
              软件下载
            </div>

            <div class="download-stack">
              <!-- Android -->
              <div class="platform-card android">
                <div class="platform-header">
                  <div class="platform-icon">
                    <i class="fa-brands fa-android"></i>
                  </div>
                  <div class="platform-name">Android 端</div>
                </div>
                <div id="android-buttons" class="android-btn-group"></div>
              </div>

              <!-- iOS -->
              <div class="platform-card apple">
                <div class="platform-header">
                  <div class="platform-icon">
                    <i class="fa-brands fa-apple"></i>
                  </div>
                  <div class="platform-name">iOS 免签版</div>
                </div>
                <a id="btn-ios" href="#" class="btn btn-ios" target="_blank"
                  >下载</a
                >

                <!-- 👈 新增：iOS 自签名说明组件 -->
                <div class="ios-notice">
                  <i class="fa-solid fa-circle-exclamation"></i>
                  <div>
                    该安装包未进行证书签名。下载后需要使用自己的 Apple ID
                    或自签工具（如巨魔、AltStore、轻松签等）进行签名后方可正常安装。
                  </div>
                </div>
              </div>

              <!-- Windows -->
              <div class="platform-card windows">
                <div class="platform-header">
                  <div class="platform-icon">
                    <i class="fa-brands fa-windows"></i>
                  </div>
                  <div class="platform-name">Windows 端</div>
                </div>
                <a
                  id="btn-windows"
                  href="#"
                  class="btn btn-windows"
                  target="_blank"
                  >下载</a
                >
              </div>
            </div>
          </div>
        </div>
        <!-- layout end -->
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const JSON_URL =
          "/eado-tool-download/latest.json?t=" +
          new Date().getTime();

        fetch(JSON_URL)
          .then((response) => {
            if (!response.ok) throw new Error("网络异常");
            return response.json();
          })
          .then((data) => renderPage(data))
          .catch((err) => {
            console.error(err);
            document.getElementById("loading-view").innerHTML = `
                        <i class="fa-solid fa-triangle-exclamation" style="color: #e74c3c; animation:none;"></i>
                        <div style="margin-top:10px; color:#e74c3c;">加载失败，请检查配置源</div>
                    `;
          });
      });

      function renderPage(data) {
        document.getElementById("version-tag").innerText = data.version;
        document.getElementById("release-date").innerText = data.releaseDate;

        // 渲染日志
        const changelogContainer = document.getElementById("changelog-content");
        changelogContainer.innerHTML = "";
        const notesArray = data.releaseNotes.split(/\n/);
        notesArray.forEach((note) => {
          const cleanNote = note.trim();
          if (cleanNote) {
            const text = cleanNote.startsWith("-")
              ? cleanNote.substring(1).trim()
              : cleanNote;
            const li = document.createElement("li");
            li.innerText = text;
            changelogContainer.appendChild(li);
          }
        });

        // 静态单链接注入
        if (data.platforms.ios)
          document.getElementById("btn-ios").href = data.platforms.ios.url;
        if (data.platforms.windows)
          document.getElementById("btn-windows").href =
            data.platforms.windows.url;

        // 安卓按钮群渲染
        if (data.platforms.android && data.platforms.android.subLinks) {
          const btnContainer = document.getElementById("android-buttons");
          btnContainer.innerHTML = "";

          data.platforms.android.subLinks.forEach((item) => {
            const btn = document.createElement("a");
            btn.href = item.url;
            btn.className = "btn btn-android";
            btn.target = "_blank";
            btn.innerHTML = ` ${item.arch.includes("arm64") ? item.arch + "(推荐)" : item.arch}`;
            if (item.arch.toLowerCase() === "universal") {
              btn.style.fontWeight = "bold";
            }
            btnContainer.appendChild(btn);
          });
        }

        // 完美呈现
        document.getElementById("loading-view").className = "hidden";
        document.getElementById("main-view").className = "";
      }
    </script>
  </body>
</html>
