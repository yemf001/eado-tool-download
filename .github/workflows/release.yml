name: Production Build Cross-Platform Apps

on:
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  # =========================================================
  # 0. 拉取 PRIVATE 仓库 + 提取版本
  # =========================================================
  get-version:
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.version }}
      commit_msg: ${{ steps.commit.outputs.msg }}

    steps:
      - name: Checkout PRIVATE repo
        uses: actions/checkout@v4
        with:
          repository: "yemf001/eado-app"
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          path: "app"
          fetch-depth: 1

      - name: Show Private Repo Last Commit
        run: |
          echo "=================================================="
          echo "     PRIVATE REPOSITORY LAST COMMIT INFO        "
          echo "=================================================="
          cd app
          git log -1 --stat
          echo "=================================================="

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Read version from tauri.conf.json
        id: version
        run: |
          VERSION=$(node -p "require('./app/src-tauri/tauri.conf.json').version")
          echo "version=v$VERSION" >> $GITHUB_OUTPUT

      - name: Get commit message
        id: commit
        run: |
          cd app
          # 1. 提取前 5 条提交摘要，每条前面加上 "- " 变成列表格式
          # 2. 并在最后一行加上 "..."
          echo "MSG<<EOF" >> $GITHUB_OUTPUT
          git log -5 --pretty="format:- %s" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "..." >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  # =========================================================
  # 1. iOS 构建作业
  # =========================================================
  build-ios:
    needs: get-version
    runs-on: macos-15

    steps:
      - name: Checkout PRIVATE Repo
        uses: actions/checkout@v4
        with:
          repository: "yemf001/eado-app"
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          path: "app"
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: "app/package-lock.json"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Install dependencies
        run: cd app && npm ci

      - name: Patch Xcode Project for Development Export
        run: |
          PBXPROJ_PATH="app/src-tauri/gen/apple/eado-app.xcodeproj/project.pbxproj"
          if [ -f "$PBXPROJ_PATH" ]; then
            sed -i '' 's/CODE_SIGNING_ALLOWED = YES;/CODE_SIGNING_ALLOWED = NO;/g' "$PBXPROJ_PATH"
            sed -i '' 's/CODE_SIGNING_REQUIRED = YES;/CODE_SIGNING_REQUIRED = NO;/g' "$PBXPROJ_PATH"
            sed -i '' '/buildSettings = {/a\
            CODE_SIGNING_ALLOWED = NO;\
            CODE_SIGNING_REQUIRED = NO;\
            CODE_SIGN_IDENTITY = "";\
            DEVELOPMENT_TEAM = "";
            ' "$PBXPROJ_PATH"
          fi

      - name: Setup xcodebuild Interceptor
        run: |
          mkdir -p $GITHUB_WORKSPACE/bin
          cat << 'EOF' > $GITHUB_WORKSPACE/bin/xcodebuild
          #!/bin/bash
          if [[ "$*" == *"-exportArchive"* ]]; then
            exit 0
          fi
          exec "/usr/bin/xcodebuild" "$@"
          EOF
          chmod +x $GITHUB_WORKSPACE/bin/xcodebuild
          echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH

      - name: Build Tauri App
        env:
          APPLE_DEVELOPMENT_TEAM: "12345ABCDE"
          CODE_SIGNING_ALLOWED: "NO"
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGN_IDENTITY: ""
        run: cd app && npx tauri ios build

      - name: Pack Unsigned IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find app/src-tauri/gen/apple -name "*.app" -type d | grep -v "DerivedData" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find /Users/runner/Library/Developer/Xcode/DerivedData -name "*.app" -type d | grep -v "Build/Intermediates" | head -n 1)
          fi
          cp -r "$APP_PATH" Payload/
          zip -r eado_app_ios.ipa Payload

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios
          path: eado_app_ios.ipa

  # =========================================================
  # 2. Windows
  # =========================================================
  build-windows:
    needs: get-version
    runs-on: windows-latest

    steps:
      - name: Checkout PRIVATE repo
        uses: actions/checkout@v4
        with:
          repository: "yemf001/eado-app"
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          path: "app"
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: "app/package-lock.json"

      - name: Cache Cargo registry and git
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('app/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install deps
        run: cd app && npm ci

      - name: Build Windows
        run: cd app && npm run tauri build

      - name: Collect EXE
        shell: bash
        run: |
          cp app/src-tauri/target/release/*.exe ./eado_app_windows.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: eado_app_windows.exe

  # =========================================================
  # 3. Android
  # =========================================================
  build-android:
    needs: get-version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PRIVATE repo
        uses: actions/checkout@v4
        with:
          repository: "yemf001/eado-app"
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          path: "app"
          fetch-depth: 1

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: "app/package-lock.json"

      - name: Cache Cargo registry and git
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('app/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install deps
        run: cd app && npm ci

      - name: Build Android
        run: cd app && npm run tauri android build -- --apk --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: app/src-tauri/gen/android/**/*.apk

  # =========================================================
  # 4. Release
  # =========================================================
  upload-release:
    needs:
      - get-version
      - build-ios
      - build-windows
      - build-android
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ needs.get-version.outputs.app_version }}
          name: Release ${{ needs.get-version.outputs.app_version }}
          body: ${{ needs.get-version.outputs.commit_msg }}
          files: |
            artifacts/**

  # =========================================================
  # 5. update pages repo (主要变更集中在此区域)
  # =========================================================
  update-pages:
    needs: [get-version, upload-release]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pages Repo
        uses: actions/checkout@v4
        with:
          repository: "yemf001/eado-tool-download"
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          ref: "pages" # 👈 显式指定切到 pages 分支

      - name: Generate latest.json
        run: |
          DATE=$(date +"%Y-%m-%d")
          VERSION="${{ needs.get-version.outputs.app_version }}"

          # 根据 Release 发布的公共仓地址动态生成（如果就在当前仓发布，保持如下即可）
          REPO_URL="https://github.com/${{ github.repository }}"

          # 1. 拼装 iOS & Windows
          IOS_URL="${REPO_URL}/releases/download/latest/eado_app_ios.ipa"
          WINDOWS_URL="${REPO_URL}/releases/download/latest/eado_app_windows.exe"

          # 2. 拼装 Android 各架构子包的链接（依据 Tauri 生成包名习惯定义）
          APK_UNIVERSAL="${REPO_URL}/releases/download/latest/app-x86-release.apk"
          APK_ARM64="${REPO_URL}/releases/download/latest/app-arm64-release.apk"
          APK_ARMV7="${REPO_URL}/releases/download/latest/app-arm-release.apk"
          APK_X86_64="${REPO_URL}/releases/download/latest/app-x86_64-release.apk"

          # 3. 使用 jq 丰富数据结构
          jq -n \
            --arg ver "$VERSION" \
            --arg date "$DATE" \
            --arg notes "${{ needs.get-version.outputs.commit_msg }}" \
            --arg ios_url "$IOS_URL" \
            --arg win_url "$WINDOWS_URL" \
            --arg apk_uni "$APK_UNIVERSAL" \
            --arg apk_a64 "$APK_ARM64" \
            --arg apk_av7 "$APK_ARMV7" \
            --arg apk_x64 "$APK_X86_64" \
            '{
              version: $ver,
              releaseDate: $date,
              releaseNotes: $notes,
              platforms: {
                android: {
                  name: "Android",
                  icon: "android",
                  subLinks: [
                    { arch: "arm64-v8a", filename: "app-arm64-release.apk", url: $apk_a64 },
                    { arch: "armeabi-v7a", filename: "app-arm-release.apk", url: $apk_av7 },
                    { arch: "x86", filename: "app-x86-release.apk", url: $apk_x86 },
                    { arch: "x86_64", filename: "app-x86_64-release.apk", url: $apk_x64 }
                  ]
                },
                ios: {
                  name: "iOS (未签名版)",
                  icon: "apple",
                  filename: "eado_app_ios.ipa",
                  url: $ios_url
                },
                windows: {
                  name: "Windows",
                  icon: "windows",
                  filename: "eado_app_windows.exe",
                  url: $win_url
                }
              }
            }' > latest.json

      - name: Commit and Push to pages branch
        env:
          COMMIT_MSG: ${{ needs.get-version.outputs.commit_msg }}
          APP_VERSION: ${{ needs.get-version.outputs.app_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest.json
          
          if git diff --staged --quiet; then
            echo "No changes in latest.json, skipping push."
          else
            # 因为 COMMIT_MSG 现在有多行，这里会完美识别为：第一行是标题，后续是详细内容
            git commit -m "chore(release): deploy $APP_VERSION" -m "$COMMIT_MSG"
            git push origin pages
          fi
