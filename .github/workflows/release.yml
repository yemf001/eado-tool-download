name: Production Build Cross-Platform Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

jobs:
  # =========================================================
  # 0. 拉取 PRIVATE 仓库 + 提取版本
  # =========================================================
  get-version:
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.version }}
      commit_msg: ${{ steps.commit.outputs.msg }}

    steps:
      - name: Checkout PRIVATE repo
        uses: actions/checkout@v4
        with:
          repository: "yemf001/eado-app"
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          path: "app"
          fetch-depth: 1

      - name: Show Private Repo Last Commit
        run: |
          echo "=================================================="
          echo "       PRIVATE REPOSITORY LAST COMMIT INFO        "
          echo "=================================================="
          cd app
          git log -1 --stat
          echo "=================================================="

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Read version from tauri.conf.json
        id: version
        run: |
          VERSION=$(node -p "require('./app/src-tauri/tauri.conf.json').version")
          echo "version=v$VERSION" >> $GITHUB_OUTPUT

      - name: Get commit message
        id: commit
        run: |
          MSG=$(cd app && git log -1 --pretty=%s)
          echo "msg=$MSG" >> $GITHUB_OUTPUT

  # =========================================================
  # 1. iOS 构建作业 (免签拦截黑科技)
  # =========================================================
  build-ios:
    needs: get-version
    runs-on: macos-15

    steps:
      - name: Checkout PRIVATE Repo
        uses: actions/checkout@v4
        with:
          repository: "yemf001/eado-app"
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          path: "app"
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: "app/package-lock.json"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Install dependencies
        run: cd app && npm ci

      - name: Patch Xcode Project for Development Export
        run: |
          # 适配子目录路径到 app/
          PBXPROJ_PATH="app/src-tauri/gen/apple/eado-app.xcodeproj/project.pbxproj"
          if [ -f "$PBXPROJ_PATH" ]; then
            sed -i '' 's/CODE_SIGNING_ALLOWED = YES;/CODE_SIGNING_ALLOWED = NO;/g' "$PBXPROJ_PATH"
            sed -i '' 's/CODE_SIGNING_REQUIRED = YES;/CODE_SIGNING_REQUIRED = NO;/g' "$PBXPROJ_PATH"
            sed -i '' '/buildSettings = {/a\
            CODE_SIGNING_ALLOWED = NO;\
            CODE_SIGNING_REQUIRED = NO;\
            CODE_SIGN_IDENTITY = "";\
            DEVELOPMENT_TEAM = "";
            ' "$PBXPROJ_PATH"
          fi

      - name: Setup xcodebuild Interceptor
        run: |
          mkdir -p $GITHUB_WORKSPACE/bin
          cat << 'EOF' > $GITHUB_WORKSPACE/bin/xcodebuild
          #!/bin/bash
          if [[ "$*" == *"-exportArchive"* ]]; then
            exit 0
          fi
          exec "/usr/bin/xcodebuild" "$@"
          EOF
          chmod +x $GITHUB_WORKSPACE/bin/xcodebuild
          echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH

      - name: Build Tauri App
        env:
          APPLE_DEVELOPMENT_TEAM: "12345ABCDE"
          CODE_SIGNING_ALLOWED: "NO"
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGN_IDENTITY: ""
        run: cd app && npx tauri ios build # 使用 npx 确保 npm 环境下命令调用正常

      - name: Pack Unsigned IPA
        run: |
          mkdir -p Payload
          # 在 app 子目录及 DerivedData 中查找 .app 产物
          APP_PATH=$(find app/src-tauri/gen/apple -name "*.app" -type d | grep -v "DerivedData" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find /Users/runner/Library/Developer/Xcode/DerivedData -name "*.app" -type d | grep -v "Build/Intermediates" | head -n 1)
          fi
          cp -r "$APP_PATH" Payload/
          zip -r eado_app_ios.ipa Payload

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios
          path: eado_app_ios.ipa

  # =========================================================
  # 2. Windows
  # =========================================================
  build-windows:
    needs: get-version
    runs-on: windows-latest

    steps:
      - name: Checkout PRIVATE repo
        uses: actions/checkout@v4
        with:
          repository: "yemf001/eado-app"
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          path: "app"
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: "app/package-lock.json"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install deps
        run: cd app && npm ci

      - name: Build Windows
        run: cd app && npm run tauri build

      - name: Collect EXE
        shell: bash
        run: |
          cp app/src-tauri/target/release/*.exe ./eado_app_windows.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: eado_app_windows.exe

  # =========================================================
  # 3. Android
  # =========================================================
  build-android:
    needs: get-version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PRIVATE repo
        uses: actions/checkout@v4
        with:
          repository: "yemf001/eado-app"
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          path: "app"
          fetch-depth: 1

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: "app/package-lock.json"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install deps
        run: cd app && npm ci

      - name: Build Android
        run: cd app && npm run tauri android build -- --apk --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: app/src-tauri/gen/android/**/*.apk

  # =========================================================
  # 4. Release
  # =========================================================
  upload-release:
    needs:
      - get-version
      - build-ios
      - build-windows
      - build-android
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ needs.get-version.outputs.app_version }}
          name: Release ${{ needs.get-version.outputs.app_version }}
          body: ${{ needs.get-version.outputs.commit_msg }}
          files: |
            artifacts/**

  # =========================================================
  # 5. update pages repo
  # =========================================================
  update-pages:
    needs: [get-version, upload-release]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pages Repo
        uses: actions/checkout@v4
        with:
          repository: "yemf001/eado-tool-download"
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}

      - name: Generate latest.json
        run: |
          DATE=$(date +"%Y-%m-%d")
          jq -n \
            --arg ver "${{ needs.get-version.outputs.app_version }}" \
            --arg date "$DATE" \
            --arg notes "${{ needs.get-version.outputs.commit_msg }}" \
            '{version: $ver, releaseDate: $date, releaseNotes: $notes}' > latest.json

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest.json
          git commit -m "update release metadata to ${{ needs.get-version.outputs.app_version }}" || exit 0
          git push
