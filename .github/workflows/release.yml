name: Production Build Cross-Platform Apps

on:
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  # =========================================================
  # 0. 拉取 PRIVATE 仓库 + 提取版本
  # =========================================================
  get-version:
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.version }}
      commit_msg: ${{ steps.commit.outputs.msg }}

    steps:
      - name: Checkout PRIVATE repo
        uses: actions/checkout@v4
        with:
          repository: "yemf001/eado-app"
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          path: "app"
          fetch-depth: 10 # 👈 确保至少拉取 5 条以上的历史，否则 git log -5 会落空

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Read version from tauri.conf.json
        id: version
        run: |
          VERSION=$(node -p "require('./app/src-tauri/tauri.conf.json').version")
          echo "version=v$VERSION" >> $GITHUB_OUTPUT

      - name: Get commit message
        id: commit
        run: |
          cd app

          # 使用一个唯一的随机标记作为多行边界，防止日志内容冲突
          EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64 | tr -dc 'a-zA-Z')

          echo "msg<<$EOF_MARKER" >> $GITHUB_OUTPUT
          git log -5 --pretty="format:- %s" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "..." >> $GITHUB_OUTPUT
          echo "$EOF_MARKER" >> $GITHUB_OUTPUT

  # =========================================================
  # 1. iOS 构建作业
  # =========================================================
  build-ios:
    needs: get-version
    runs-on: macos-15

    # 🌟 核心改动：引入策略矩阵
    strategy:
      matrix:
        # 定义两个版本：normal（普通版）和 baozou（暴走版）
        version_type: [normal, baozou]

    steps:
      - name: Checkout PRIVATE Repo
        uses: actions/checkout@v4
        with:
          repository: "yemf001/eado-app"
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          path: "app"
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: "app/package-lock.json"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Install dependencies
        run: cd app && npm ci

      - name: Patch Xcode Project for Development Export
        run: |
          PBXPROJ_PATH="app/src-tauri/gen/apple/eado-app.xcodeproj/project.pbxproj"
          if [ -f "$PBXPROJ_PATH" ]; then
            sed -i '' 's/CODE_SIGNING_ALLOWED = YES;/CODE_SIGNING_ALLOWED = NO;/g' "$PBXPROJ_PATH"
            sed -i '' 's/CODE_SIGNING_REQUIRED = YES;/CODE_SIGNING_REQUIRED = NO;/g' "$PBXPROJ_PATH"
            sed -i '' '/buildSettings = {/a\
            CODE_SIGNING_ALLOWED = NO;\
            CODE_SIGNING_REQUIRED = NO;\
            CODE_SIGN_IDENTITY = "";\
            DEVELOPMENT_TEAM = "";
            ' "$PBXPROJ_PATH"
          fi

      - name: Setup xcodebuild Interceptor
        run: |
          mkdir -p $GITHUB_WORKSPACE/bin
          cat << 'EOF' > $GITHUB_WORKSPACE/bin/xcodebuild
          #!/bin/bash
          if [[ "$*" == *"-exportArchive"* ]]; then
            exit 0
          fi
          exec "/usr/bin/xcodebuild" "$@"
          EOF
          chmod +x $GITHUB_WORKSPACE/bin/xcodebuild
          echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH

      - name: Build Tauri App
        env:
          APPLE_DEVELOPMENT_TEAM: "12345ABCDE"
          CODE_SIGNING_ALLOWED: "NO"
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGN_IDENTITY: ""
          # 🌟 核心改动：根据矩阵动态注入 Vite 环境变量
          # 如果当前是 baozou 矩阵，就注入 "true"，否则注入空或 "false"
          VITE_BAOZOU: ${{ matrix.version_type == 'baozou' && 'true' || 'false' }}
        run: cd app && npx tauri ios build

      - name: Pack Unsigned IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find app/src-tauri/gen/apple -name "*.app" -type d | grep -v "DerivedData" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find /Users/runner/Library/Developer/Xcode/DerivedData -name "*.app" -type d | grep -v "Build/Intermediates" | head -n 1)
          fi
          cp -r "$APP_PATH" Payload/
          # 🌟 核心改动：打包成不同名字的 ipa 文件（如 eado_app_ios_normal.ipa 或 eado_app_ios_baozou.ipa）
          zip -r "eado_app_ios_${{ matrix.version_type }}.ipa" Payload

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          # 🌟 核心改动：区分 Artifact 产物名称
          name: ios-${{ matrix.version_type }}
          path: eado_app_ios_${{ matrix.version_type }}.ipa

  # =========================================================
  # 2. Windows
  # =========================================================
  build-windows:
    needs: get-version
    runs-on: windows-latest

    steps:
      - name: Checkout PRIVATE repo
        uses: actions/checkout@v4
        with:
          repository: "yemf001/eado-app"
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          path: "app"
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: "app/package-lock.json"

      - name: Cache Cargo registry and git
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('app/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install deps
        run: cd app && npm ci

      - name: Build Windows
        run: cd app && npm run tauri build

      - name: Collect EXE
        shell: bash
        run: |
          cp app/src-tauri/target/release/*.exe ./eado_app_windows.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: eado_app_windows.exe

  # =========================================================
  # 3. Android
  # =========================================================
  build-android:
    needs: get-version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PRIVATE repo
        uses: actions/checkout@v4
        with:
          repository: "yemf001/eado-app"
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          path: "app"
          fetch-depth: 1

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: "app/package-lock.json"

      - name: Cache Cargo registry and git
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('app/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install deps
        run: cd app && npm ci

      - name: Build Android
        run: cd app && npm run tauri android build -- --apk --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: app/src-tauri/gen/android/**/*.apk

  # =========================================================
  # 3.5 新增：Linux 构建作业 (.deb, .AppImage, .rpm)
  # =========================================================
  build-linux:
    needs: get-version
    # 1. 切回满足 Tauri v2 编译的 ubuntu-22.04 环境
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout PRIVATE repo
        uses: actions/checkout@v4
        with:
          repository: "yemf001/eado-app"
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          path: "app"
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: "app/package-lock.json"

      - name: Cache Cargo registry and git
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('app/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          # 2. 换回满足 Tauri v2 的 4.1 库，并补上 rpm 工具
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm

      - name: Install deps
        run: cd app && npm ci

      - name: Inject Linux build targets
        run: |
          node -e "
            const fs = require('fs');
            const file = './app/src-tauri/tauri.conf.json';
            const data = JSON.parse(fs.readFileSync(file, 'utf8'));
            if (data.bundle) {
              data.bundle.targets = ['deb', 'appimage', 'rpm'];
            } else if (data.tauri && data.tauri.bundle) {
              data.tauri.bundle.targets = ['deb', 'appimage', 'rpm'];
            }
            fs.writeFileSync(file, JSON.stringify(data, null, 2));
          "

      - name: Build Linux
        # 3. 终极破局：在打包时，通过环境变量告诉 Rust 编译器对不兼容的 WebKit 符号做弱链接处理 (允许运行时缺失)
        # 这样编译产物就算带了新函数，到了银河麒麟的旧 WebKit 上也只会忽略，而不会报 symbol lookup error 崩溃
        env:
          RUSTFLAGS: "-C link-arg=-Wl,--allow-shlib-undefined"
        run: cd app && npm run tauri build

      - name: Collect Linux Packages
        run: |
          mkdir -p linux_packages
          cp $(find app/src-tauri/target/release/bundle/deb/ -name "*.deb" | head -n 1) ./linux_packages/eado_app_linux.deb
          cp $(find app/src-tauri/target/release/bundle/appimage/ -name "*.AppImage" | head -n 1) ./linux_packages/eado_app_linux.AppImage
          cp $(find app/src-tauri/target/release/bundle/rpm/ -name "*.rpm" | head -n 1) ./linux_packages/eado_app_linux.rpm

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: linux_packages/*

  # =========================================================
  # 4. Release
  # =========================================================
  upload-release:
    needs:
      - get-version
      - build-ios
      - build-windows
      - build-android
      - build-linux
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ needs.get-version.outputs.app_version }}
          name: Release ${{ needs.get-version.outputs.app_version }}
          body: ${{ needs.get-version.outputs.commit_msg }}
          files: |
            artifacts/**

  # =========================================================
  # 5. update pages repo (主要变更集中在此区域)
  # =========================================================
  update-pages:
    needs: [get-version, upload-release]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pages Repo
        uses: actions/checkout@v4
        with:
          repository: "yemf001/eado-tool-download"
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          ref: "pages" # 👈 显式指定切到 pages 分支

      - name: Generate latest.json
        run: |
          DATE=$(date +"%Y-%m-%d")
          VERSION="${{ needs.get-version.outputs.app_version }}"
          REPO_URL="https://github.com/${{ github.repository }}"

          IOS_NORMAL_URL="${REPO_URL}/releases/download/${VERSION}/eado_app_ios_normal.ipa"
          IOS_BAOZOU_URL="${REPO_URL}/releases/download/${VERSION}/eado_app_ios_baozou.ipa"
          WINDOWS_URL="${REPO_URL}/releases/download/${VERSION}/eado_app_windows.exe"
          LINUX_DEB="${REPO_URL}/releases/download/${VERSION}/eado_app_linux.deb"
          LINUX_APPIMAGE="${REPO_URL}/releases/download/${VERSION}/eado_app_linux.AppImage"
          LINUX_RPM="${REPO_URL}/releases/download/${VERSION}/eado_app_linux.rpm"
          APK_X86="${REPO_URL}/releases/download/${VERSION}/app-x86-release.apk"
          APK_ARM64="${REPO_URL}/releases/download/${VERSION}/app-arm64-release.apk"
          APK_ARMV7="${REPO_URL}/releases/download/${VERSION}/app-arm-release.apk"
          APK_X86_64="${REPO_URL}/releases/download/${VERSION}/app-x86_64-release.apk"

          # 🌟 修复核心：将带有单双引号交织的 HTML 文本定义为独立的 Bash 变量
          IOS_NOTICE_CONTENT="由于本App是<span class=\"font-bold text-red-600\">未签名版(IPA)</span>，无法直接在手机上点击安装。你需要将文件下载后，使用签名工具进行签名投递。<br><br><strong class=\"text-gray-700\">🛠️ 推荐使用以下工具安装：</strong><br>• <strong>电脑端：</strong>爱思助手（全自动签名安装）/ Sideloadly<br>• <strong>手机端：</strong>轻松签 / 巨魔商店 (TrollStore) / AltStore"

          jq -n \
            --arg ver "$VERSION" \
            --arg date "$DATE" \
            --arg notes "${{ needs.get-version.outputs.commit_msg }}" \
            --arg ios_normal "$IOS_NORMAL_URL" \
            --arg ios_baozou "$IOS_BAOZOU_URL" \
            --arg win_url "$WINDOWS_URL" \
            --arg apk_x86 "$APK_X86" \
            --arg apk_a64 "$APK_ARM64" \
            --arg apk_av7 "$APK_ARMV7" \
            --arg apk_x64 "$APK_X86_64" \
            --arg lin_deb "$LINUX_DEB" \
            --arg lin_appimage "$LINUX_APPIMAGE" \
            --arg lin_rpm "$LINUX_RPM" \
            --arg ios_notice "$IOS_NOTICE_CONTENT" \
            '{
              version: $ver,
              releaseDate: $date,
              releaseNotes: $notes,
              platforms: {
                android: {
                  name: "Android",
                  icon: "android",
                  subLinks: [
                    { arch: "arm64-v8a", filename: "app-arm64-release.apk", url: $apk_a64 },
                    { arch: "armeabi-v7a", filename: "app-arm-release.apk", url: $apk_av7 },
                    { arch: "x86", filename: "app-x86-release.apk", url: $apk_x86 },
                    { arch: "x86_64", filename: "app-x86_64-release.apk", url: $apk_x64 }
                  ]
                },
                ios: {
                  name: "iOS (未签名版)",
                  icon: "apple",
                  notice: {
                    title: "苹果手机用户安装提示：",
                    content: $ios_notice,
                    type: "warning"
                  },
                  subLinks: [
                    { type: "normal", name: "普通版", filename: "eado_app_ios_normal.ipa", url: $ios_normal },
                    { type: "baozou", name: "暴走版", filename: "eado_app_ios_baozou.ipa", url: $ios_baozou }
                  ]
                },
                windows: {
                  name: "Windows",
                  icon: "windows",
                  filename: "eado_app_windows.exe",
                  url: $win_url
                },
                linux: {
                  name: "Linux",
                  icon: "linux",
                  subLinks: [
                    { type: "deb", name: "Deb", filename: "eado_app_linux.deb", url: $lin_deb },
                    { type: "appimage", name: "AppImage", filename: "eado_app_linux.AppImage", url: $lin_appimage },
                    { type: "rpm", name: "Rpm", filename: "eado_app_linux.rpm", url: $lin_rpm }
                  ]
                }
              }
            }' > latest.json

      - name: Commit and Push to pages branch
        env:
          COMMIT_MSG: ${{ needs.get-version.outputs.commit_msg }}
          APP_VERSION: ${{ needs.get-version.outputs.app_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest.json

          if git diff --staged --quiet; then
            echo "No changes in latest.json, skipping push."
          else
            # 因为 COMMIT_MSG 现在有多行，这里会完美识别为：第一行是标题，后续是详细内容
            git commit -m "chore(release): deploy $APP_VERSION" -m "$COMMIT_MSG"
            git push origin pages
          fi
